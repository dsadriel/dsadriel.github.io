<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Adriel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  .project-detail-content {
    padding-top: 160px;
    padding-left: 48px;
    padding-right: 48px;
  }

  /* Breadcrumb Nav Styles */
  .nav-breadcrumb {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-back-link {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-back-link:hover {
    color: var(--blue);
  }

  .nav-back-link img {
    opacity: 0.6;
    transition: opacity 0.2s, transform 0.2s;
  }

  .nav-back-link:hover img {
    opacity: 1;
    filter: invert(1) sepia(1) saturate(5) hue-rotate(175deg); /* Match blue color */
  }

  .nav-sep {
    color: var(--surface-2);
    font-weight: 300;
    font-size: 18px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 32px;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }

  .project-detail-header {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    margin-bottom: 64px;
  }

  .project-detail-icon {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    object-fit: cover;
    background: var(--surface-1);
    border: 1px solid var(--surface-2);
  }

  .project-detail-title-wrap h1 {
    font-size: clamp(40px, 6vw, 64px);
    margin-bottom: 12px;
  }

  .project-detail-headline {
    font-size: 20px;
    color: var(--text-subtle);
    max-width: 600px;
  }

  .project-detail-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 64px;
    margin-bottom: 64px;
  }

  .detail-section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--surface-2);
  }

  .project-description {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text-subtle);
  }
  .project-description b { color: var(--text); }

  .detail-sidebar {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .sidebar-item-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 12px;
    color: var(--text);
  }

  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .detail-tag {
    font-size: 12px;
    padding: 4px 12px;
    background: var(--surface-1);
    border: 1px solid var(--surface-2);
    color: var(--text-subtle);
  }

  .project-links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface-1);
    border: 1px solid var(--surface-2);
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
  }
  .link-btn:hover {
    border-color: var(--blue);
    background: var(--surface-2);
  }
  .link-btn img {
    width: 18px;
    height: 18px;
  }

  .media-gallery {
    margin-bottom: 64px;
  }

  .media-scroll {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface-2) transparent;
    cursor: grab;
  }
  .media-scroll:active { cursor: grabbing; }

  .media-scroll img, .media-scroll video {
    width: auto;
    height: auto;
    max-height: min(60vh, 600px);
    max-width: min(90vw, 700px);
    border: 1px solid var(--surface-2);
    flex-shrink: 0;
    border-radius: 12px;
  }

  .team-section {
    background: var(--surface-0);
    padding: 48px;
    border: 1px solid var(--surface-2);
  }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }

  .team-member {
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-decoration: none;
    color: inherit;
  }

  .member-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
  }

  .member-role {
    font-size: 13px;
    color: var(--text-muted);
  }

  .member-link-icon {
    width: 14px;
    height: 14px;
    margin-left: 4px;
    filter: brightness(0.7);
  }

  @media (max-width: 800px) {
  .nav-links { display: none; }
  .media-scroll img, .media-scroll video { height: auto; max-height: 450px; }
  .project-detail-header { flex-direction: column; gap: 24px; }
  .project-detail-grid { grid-template-columns: 1fr; gap: 48px; }
    .project-detail-content { padding: 140px 24px 64px; }
    .team-section { padding: 24px; margin-left: -24px; margin-right: -24px; border-left: none; border-right: none; }
  }
  </style>
  </head>
  <body>

  <nav>
  <div class="nav-breadcrumb">
  <a href="../" class="nav-back-link" data-i18n="nav.back">
    <img src="../assets/images/arrow.svg" alt="" style="width: 12px; height: 12px; transform: rotate(-135deg); filter: var(--icon-filter);">
    back
  </a>
  <span class="nav-sep">/</span>
  <a href="../#hero" class="nav-logo">adriel<span>.</span></a>
  </div>
  <div style="display: flex; align-items: center;">
    <ul class="nav-links">
      <li><a href="../#work" data-i18n="nav.work">work</a></li>
      <li><a href="../#skills-experience" data-i18n="nav.about">about</a></li>
      <li><a href="../#contact" data-i18n="nav.contact">contact</a></li>
    </ul>
    <button class="lang-toggle" id="lang-toggle" aria-label="Toggle language">PT-BR</button>
  </div>
  </nav>

  <main class="project-detail-content">
  <header class="project-detail-header">    <img id="project-icon" src="" alt="" class="project-detail-icon">
    <div class="project-detail-title-wrap">
      <h1 id="project-name">Loading...</h1>
      <p id="project-headline" class="project-detail-headline"></p>
    </div>
  </header>

  <div class="media-gallery" id="media-gallery" style="display: none;">
    <div class="detail-section-title" data-i18n="project.gallery">Gallery</div>
    <div class="media-scroll" id="media-scroll"></div>
  </div>

  <div class="project-detail-grid">
    <div class="detail-main">
      <div class="detail-section-title" data-i18n="project.about">About the project</div>
      <div id="project-description" class="project-description"></div>
    </div>

    <aside class="detail-sidebar">
      <div id="links-block" style="display: none;">
        <div class="sidebar-item-title" data-i18n="project.links">Links</div>
        <div class="project-links" id="project-links"></div>
      </div>

      <div id="tech-block" style="display: none;">
        <div class="sidebar-item-title" data-i18n="project.tech">Technologies</div>
        <div class="detail-tags" id="project-tech"></div>
      </div>

      <div id="roles-block" style="display: none;">
        <div class="sidebar-item-title" data-i18n="project.roles">My Roles</div>
        <div class="detail-tags" id="project-roles"></div>
      </div>
    </aside>
  </div>

  <section class="team-section" id="team-section" style="display: none;">
    <div class="detail-section-title" data-i18n="project.team">The Team</div>
    <div class="team-grid" id="team-grid"></div>
  </section>
</main>

<footer>
  <span>© 2026 Adriel de Souza</span>
  <span data-i18n="footer.address">Porto Alegre, Brasil</span>
</footer>

<script src="../lang.js"></script>
<script src="../projectData.js"></script>
<script src="script.js"></script>
</body>
</html>
